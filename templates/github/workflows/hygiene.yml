# Hygiene checks — auto-fix missing metadata on issues and PRs
name: Issue & PR Hygiene

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  check-metadata:
    name: Check required metadata
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const item = context.payload.issue || context.payload.pull_request;
            const type = context.payload.issue ? 'issue' : 'PR';
            const warnings = [];

            // Check for labels
            if (!item.labels || item.labels.length === 0) {
              warnings.push(`Missing labels — please add at least one label (bug, enhancement, documentation, engineering)`);
            }

            // Check for milestone
            if (!item.milestone) {
              warnings.push(`Missing milestone — assign to the relevant release milestone (R0, R1, etc.)`);
            }

            if (warnings.length > 0) {
              const body = `### Metadata check\n\n${warnings.map(w => `- ${w}`).join('\n')}\n\n_This is an automated check. Please update the ${type} metadata._`;

              if (context.payload.issue) {
                await github.rest.issues.createComment({
                  ...context.repo,
                  issue_number: item.number,
                  body,
                });
              } else {
                await github.rest.pulls.createReview({
                  ...context.repo,
                  pull_number: item.number,
                  body,
                  event: 'COMMENT',
                });
              }
            }
