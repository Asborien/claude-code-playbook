# Generic CI workflow — adapt to your stack
# This runs on every push to staging and every PR
name: CI

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Adapt this section to your package manager and stack:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Uncomment the package manager you use:
      # - uses: pnpm/action-setup@v4
